name: Fabricar Biblia
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Preparar Android
        uses: android-actions/setup-android@v3

      - name: Instalar Flet y Dependencias
        run: flet build apk
          pip install flet
          pip install --upgrade flet

      - name: Fabricar APK
        run: flet build apk --main main.py --assets assets
