name: Fabricar Biblia Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Flet
        run: pip install flet --upgrade

      - name: Compilar APK
        run: |
          # El 'yes |' es para aceptar licencias automáticamente
          yes | flet build apk

      - name: Entregar APK (Rastreo Total)
        uses: actions/upload-artifact@v4
        with:
          name: Biblia_Instalable_Final
          # Esta línea busca el APK en cualquier carpeta que se haya creado
          path: build/**/*.apk
          if-no-files-found: error


