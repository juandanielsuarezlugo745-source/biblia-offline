name: Fabricar Biblia
on: 
  workflow_dispatch: # Esto activa el botón azul manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Configurar Java (Necesario para Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Flet
        run: pip install flet --upgrade

      - name: Cocinar APK
        run: |
          # El comando 'yes' es para aceptar las licencias de Android automáticamente
          yes | flet build apk

      - name: Entregar APK Final
        uses: actions/upload-artifact@v4
        with:
          name: Biblia_Instalable
          # El truco de los asteriscos para que encuentre el archivo donde sea que Flet lo guarde
          path: "**/build/apk/*.apk"
          if-no-files-found: error
