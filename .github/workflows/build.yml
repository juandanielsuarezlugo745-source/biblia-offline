name: Fabricar Biblia Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Preparar Android
        uses: android-actions/setup-android@v3

      - name: Instalar Flet
        run: pip install flet --upgrade

      - name: Fabricar APK
        run: |
          # Flet 0.82+ detecta Biblia.json automáticamente si está en la raíz
          yes | flet build apk

      - name: Entregar Archivo APK
        uses: actions/upload-artifact@v4
        with:
          name: MiBibliaInstalable
          path: build/apk/*.apk
