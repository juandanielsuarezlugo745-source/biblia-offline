name: Fabricar Biblia Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Flet
        run: pip install flet --upgrade

      - name: Compilar APK con Assets
        run: |
          # El comando incluye explícitamente la carpeta de la biblia
          flet build apk --include-assets assets

      - name: Subir APK Resultante
        uses: actions/upload-artifact@v4
        with:
          name: Biblia_Instalable_Final
          path: build/apk/*.apk
