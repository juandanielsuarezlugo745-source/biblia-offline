- name: Fabricar APK
  run: flet build apk --main main.py

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Flet
        run: pip install flet

      - name: Fabricar APK
        run: flet build apk --main main.py --assets assets

      - name: Subir Resultado
        uses: actions/upload-artifact@v4
        with:
          name: MiBibliaAPK
          path: build/apk/*.apk
