name: Fabricar Biblia Offline
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Flet
        run: pip install flet

      - name: Construir APK
        run: flet build apk --main main.py --assets assets

      - name: Subir APK terminada
        uses: actions/upload-artifact@v4
        with:
          name: MiBibliaAPK
          path: build/apk/*.apk
