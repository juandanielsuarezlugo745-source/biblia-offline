name: Fabricar Biblia
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar y Construir
        run: |
          pip install flet
          flet build apk --main main.py --assets assets
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: MiBibliaAPK
          path: build/apk/*.apk
